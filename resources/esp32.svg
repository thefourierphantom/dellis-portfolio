<svg viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ESP32 development board">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3e4650"/>
      <stop offset="0.5" stop-color="#2a3038"/>
      <stop offset="1" stop-color="#1c2128"/>
    </linearGradient>
    <linearGradient id="pcb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121a23"/>
      <stop offset="1" stop-color="#0c1218"/>
    </linearGradient>
    <radialGradient id="ledglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff3448" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ff3448" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- PCB -->
  <rect x="42" y="24" width="558" height="152" rx="7" fill="url(#pcb)" stroke="#2a3038" stroke-width="1.5"/>
  <!-- mounting holes -->
  <circle cx="58" cy="40" r="5" fill="#05070a" stroke="#b98f45" stroke-width="1.4"/>
  <circle cx="58" cy="160" r="5" fill="#05070a" stroke="#b98f45" stroke-width="1.4"/>
  <circle cx="584" cy="40" r="5" fill="#05070a" stroke="#b98f45" stroke-width="1.4"/>
  <circle cx="584" cy="160" r="5" fill="#05070a" stroke="#b98f45" stroke-width="1.4"/>

  <!-- pin headers (top / bottom) -->
  <g fill="#c9a24a">
    <g id="pins-top">
      <rect x="130" y="28" width="7" height="9" rx="1"/><rect x="148" y="28" width="7" height="9" rx="1"/>
      <rect x="166" y="28" width="7" height="9" rx="1"/><rect x="184" y="28" width="7" height="9" rx="1"/>
      <rect x="202" y="28" width="7" height="9" rx="1"/><rect x="220" y="28" width="7" height="9" rx="1"/>
      <rect x="238" y="28" width="7" height="9" rx="1"/><rect x="256" y="28" width="7" height="9" rx="1"/>
      <rect x="274" y="28" width="7" height="9" rx="1"/><rect x="292" y="28" width="7" height="9" rx="1"/>
      <rect x="310" y="28" width="7" height="9" rx="1"/><rect x="328" y="28" width="7" height="9" rx="1"/>
      <rect x="346" y="28" width="7" height="9" rx="1"/><rect x="364" y="28" width="7" height="9" rx="1"/>
      <rect x="382" y="28" width="7" height="9" rx="1"/><rect x="400" y="28" width="7" height="9" rx="1"/>
      <rect x="418" y="28" width="7" height="9" rx="1"/><rect x="436" y="28" width="7" height="9" rx="1"/>
      <rect x="454" y="28" width="7" height="9" rx="1"/><rect x="472" y="28" width="7" height="9" rx="1"/>
      <rect x="490" y="28" width="7" height="9" rx="1"/><rect x="508" y="28" width="7" height="9" rx="1"/>
    </g>
    <use href="#pins-top" y="135"/>
  </g>

  <!-- PCB meander antenna (left) -->
  <g stroke="#b98f45" stroke-width="3" fill="none" stroke-linecap="square">
    <path d="M70 62 H104 M70 78 H104 M70 94 H104 M70 110 H104 M70 126 H104"/>
    <path d="M104 62 V78 M70 78 V94 M104 94 V110 M70 110 V126 M70 62 V54 H86"/>
  </g>
  <text x="72" y="146" font-family="'JetBrains Mono', monospace" font-size="8" fill="#4a545f" letter-spacing="1">2.4G ANT</text>

  <!-- RF shield -->
  <rect x="126" y="48" width="192" height="104" rx="4" fill="url(#shield)" stroke="#4a545f" stroke-width="1.2"/>
  <rect x="126" y="48" width="192" height="18" rx="4" fill="#ffffff" opacity="0.05"/>
  <circle cx="142" cy="64" r="4" fill="none" stroke="#7c8794" stroke-width="1"/>
  <text x="222" y="98" font-family="'JetBrains Mono', monospace" font-size="14" fill="#aeb6c0" letter-spacing="1.5" text-anchor="middle">ESP32</text>
  <text x="222" y="116" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b7480" letter-spacing="2" text-anchor="middle">WROOM-32</text>
  <text x="222" y="138" font-family="'JetBrains Mono', monospace" font-size="7" fill="#4a545f" letter-spacing="1" text-anchor="middle">FCC ID 2AC7Z-ESPWROOM32</text>

  <!-- silkscreen traces -->
  <g stroke="#22303f" stroke-width="1.4" fill="none">
    <path d="M318 70 H352 V56 H392 M318 96 H360 M318 122 H348 V138 H380"/>
    <path d="M470 60 V90 H502 M470 140 V114 H494"/>
  </g>

  <!-- passives -->
  <g>
    <rect x="336" y="62" width="16" height="8" rx="1" fill="#1a222c" stroke="#39424d" stroke-width="0.8"/>
    <rect x="336" y="88" width="16" height="8" rx="1" fill="#1a222c" stroke="#39424d" stroke-width="0.8"/>
    <rect x="360" y="88" width="16" height="8" rx="1" fill="#2c333c" stroke="#39424d" stroke-width="0.8"/>
    <rect x="336" y="114" width="8" height="16" rx="1" fill="#1a222c" stroke="#39424d" stroke-width="0.8"/>
    <rect x="398" y="60" width="26" height="26" rx="2" fill="#161c24" stroke="#39424d" stroke-width="1"/>
    <rect x="398" y="112" width="34" height="20" rx="2" fill="#161c24" stroke="#39424d" stroke-width="1"/>
    <text x="401" y="126" font-family="'JetBrains Mono', monospace" font-size="7" fill="#4a545f">CP2102</text>
  </g>

  <!-- power LED -->
  <circle cx="448" cy="70" r="14" fill="url(#ledglow)"/>
  <rect x="444" y="66" width="8" height="8" rx="1.5" fill="#e2182b"/>
  <text x="440" y="88" font-family="'JetBrains Mono', monospace" font-size="7" fill="#6b7480">PWR</text>

  <!-- EN / BOOT buttons -->
  <g>
    <rect x="470" y="52" width="24" height="16" rx="2" fill="#2a3038" stroke="#4a545f" stroke-width="1"/>
    <circle cx="482" cy="60" r="4.5" fill="#39424d"/>
    <text x="471" y="80" font-family="'JetBrains Mono', monospace" font-size="7" fill="#6b7480">EN</text>
    <rect x="470" y="132" width="24" height="16" rx="2" fill="#2a3038" stroke="#4a545f" stroke-width="1"/>
    <circle cx="482" cy="140" r="4.5" fill="#39424d"/>
    <text x="466" y="128" font-family="'JetBrains Mono', monospace" font-size="7" fill="#6b7480">BOOT</text>
  </g>

  <!-- micro-USB -->
  <rect x="562" y="82" width="38" height="36" rx="3" fill="#4a545f" stroke="#6b7480" stroke-width="1"/>
  <rect x="570" y="90" width="30" height="20" rx="2" fill="#161c24"/>
  <rect x="596" y="86" width="10" height="28" rx="2" fill="#39424d"/>

  <!-- silkscreen labels -->
  <text x="516" y="44" font-family="'JetBrains Mono', monospace" font-size="7" fill="#4a545f" letter-spacing="1">DEVKIT V1</text>
  <text x="130" y="170" font-family="'JetBrains Mono', monospace" font-size="7" fill="#3a434d" letter-spacing="1.5">3V3 · GND · EN · VP · VN · D34 · D35 · D32 · D33 · D25 · D26</text>
</svg>
